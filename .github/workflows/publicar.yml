name: Publicar Livro no GitHub Pages

on:
  push:
    branches:
      - main        # dispara sempre que você fizer push na branch main
  workflow_dispatch: # permite rodar manualmente pela interface do GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Evita publicações paralelas — se você fizer dois pushes seguidos,
# o segundo cancela o anterior
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Compilar com Pandoc e publicar
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o Pandoc
      - name: Instalar Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      # 3. Gera o HTML com todos os capítulos
      #    Os arquivos .md são compilados em ordem alfabética/numérica
      - name: Gerar HTML do livro
        run: |
          mkdir -p _site

          pandoc metadata.yaml \
            00-prefacio.md \
            01-capitulo.md \
            02-capitulo.md \
            99-conclusao.md \
            --output=_site/index.html \
            --standalone \
            --css=estilo.css \
            --table-of-contents \
            --toc-depth=2 \
            --number-sections \
            --highlight-style=tango

          # Copia o CSS para a pasta de saída
          cp estilo.css _site/estilo.css

          # Copia imagens se existirem
          if [ -d "assets" ]; then
            cp -r assets _site/assets
          fi

      # 4. Prepara o ambiente do GitHub Pages
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      # 5. Empacota os arquivos gerados
      - name: Empacotar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
