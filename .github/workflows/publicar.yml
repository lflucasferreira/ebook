name: Publicar Livro no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Compilar com Pandoc e publicar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Gerar HTML do livro
        run: |
          mkdir -p _site

          pandoc metadata.yaml \
            00-prefacio.md \
            01-capitulo.md \
            02-capitulo.md \
            99-conclusao.md \
            100-referencias.md \
            --output=_site/index.html \
            --standalone \
            --css=estilo.css \
            --table-of-contents \
            --toc-depth=2 \
            --syntax-highlighting=tango \
            --metadata title="Back to Feedback"

          cp estilo.css _site/estilo.css

          if [ -d "assets" ]; then
            cp -r assets _site/assets
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Empacotar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
